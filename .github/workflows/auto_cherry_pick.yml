name: Auto Cherry-Pick from Upstream

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "Base branch to create the PR against"
        required: true
        default: "main"
      mode:
        description: "Run mode: cherry-pick or verify"
        required: false
        default: "cherry-pick"
      script:
        description: "Build script to run"
        required: false
        default: "yarn build"
      package_manager:
        description: "Package manager to use"
        required: false
        default: "yarn"
      node_version:
        description: "Node.js version to use"
        required: false
        default: "24"

  pull_request:
    types: [opened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write
  packages: read
  issues: write

jobs:
  cherry-pick:
    if: github.event_name == 'workflow_dispatch' || contains(fromJson(toJson(github.event.pull_request.labels)).*.name, 'review-required')
    uses: step-security/reusable-workflows/.github/workflows/auto_cherry_pick.yaml@v1
    with:
      original-owner: "vimtor"
      repo-name: "action-zip"
      base_branch: ${{ inputs.base_branch }}
      mode: ${{ github.event_name == 'pull_request' && 'verify' || inputs.mode }}
      script: ${{ inputs.script || 'yarn build' }}
      package_manager: ${{ inputs.package_manager || 'yarn' }}
      node_version: ${{ inputs.node_version || '24' }}
